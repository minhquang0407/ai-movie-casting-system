version: '3.8'

services:
  # 1. Data Lakehouse Storage
  minio:
    image: minio/minio:latest
    container_name: casting_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - ./data/minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - casting_network

  # 2. Operational Graph Database
  neo4j:
    image: neo4j:5.18.0
    container_name: casting_neo4j
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt Port cho Python Driver
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./data/neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s # Cho phép JVM khởi động trước khi bắt đầu đếm lỗi
    networks:
      - casting_network

  # 3. AI Inference API (CPU)
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: casting_api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    depends_on:
      neo4j:
        condition: service_healthy # Lời giải cho bài toán Race Condition
    networks:
      - casting_network

  # 4. Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: casting_frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - casting_network

networks:
  casting_network:
    driver: bridge